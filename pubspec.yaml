name: tilepave_pro
description: "Tile Mate - Smart Tiling Assistant"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  shared_preferences: ^2.2.2
  intl: ^0.19.0
  share_plus: ^7.2.2
  path_provider: ^2.1.2
  pdf: ^3.10.7
  printing: ^5.11.1
  google_mobile_ads: ^5.1.0
  sqflite: ^2.3.2
  path: ^1.9.0
  uuid: ^4.3.3
  file_picker: ^8.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.1
  flutter_native_splash: ^2.4.1

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon/icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#0F0F0F"
  adaptive_icon_foreground: "assets/icon/icon_foreground.png"

flutter_native_splash:
  color: "#0F0F0F"
  image: "assets/icon/icon.png"
  android_12:
    color: "#0F0F0F"
    image: "assets/icon/icon.png"
    icon_background_color: "#0F0F0F"
  android: true
  ios: false

flutter:
  uses-material-design: true
  assets:
    - assets/icon/